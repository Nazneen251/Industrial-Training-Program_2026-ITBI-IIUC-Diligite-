<body>
  <div class="container">
    <center>
      <h1>LOGIN</h1>
    </center>
    <form id="login" action="login.php" method="post">
      <div class="form-row">
        <label for="name">Name:</label>
        <input type="text" name="name" id="name" placeholder="your name" required />
      </div>
      <div class="form-row">
        <label for="email">Email:</label>
        <input type="email" name="email" id="email" placeholder="your email" value="@gmail.com" required />
      </div>

      <div class="form-row">
        <label for="password">Password:</label>
        <input type="password" name="password" required />
      </div>
      <div class="form-row">
        <input name="submit" type="submit" class="submit" value="Login" />
      </div>
    </form>
    <div>
      <br />
      <p class="para-2">
        Not have an account? <a style="color: white;" href="registration.html">Register Here</a>
      </p>
    </div>
  </div>
